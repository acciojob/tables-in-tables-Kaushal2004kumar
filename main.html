<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Table</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
	  <table class="outer">
    <tr>
        <!-- Left Top -->
        <td>
            <table width="100%" border="2px solid black">
                <tr>
                    <th colspan="2" class="title">Nested Table 2</th>
                </tr>
                <tr>
                    <th>Column 1</th>
                    <th>Column 2</th>
                </tr>
                <tr>
                    <td>abc</td>
                    <td>def</td>
                </tr>
            </table>
        </td>

        <!-- Right Top -->
        <td>
            <table width="100%" border="2px solid black">
                <tr>
                    <th class="title">Nested Table 1</th>
                </tr>
                <tr>
                    <td>
                        <ul style="text-align:left;">
                            <li>List item</li>
                            <li>List item</li>
                            <li>List item</li>
                        </ul>
                    </td>
                </tr>
            </table>
        </td>
    </tr>

    <tr>
        <!-- Left Bottom -->
        <td>
            <table width="100%" border="2px solid black">
                <tr>
                    <th colspan="2" class="title">Nested Table 3</th>
                </tr>
                <tr>
                    <td>
                        <a href="#">Nested Table</a>
                    </td>
                    <td>Demo Continued</td>
                </tr>
            </table>
        </td>

        <!-- Right Bottom -->
        <td>
            <table width="100%" border="2px solid black">
                <tr>
                    <th class="title">Nested Table 4</th>
                </tr>
                <tr>
                    <td class="black">HTML</td>
                </tr>
            </table>
        </td>
    </tr>
</table>
	  
 
  </body>
</html>
